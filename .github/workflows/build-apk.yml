name: Build APK — Reparto Facil
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/android @capacitor/cli
      - name: Preparar www
        run: |
          mkdir -p www
          cp index.html manifest.json sw.js www/
          cp -r css js icons www/
      - name: Add Android
        run: npx cap add android
      - name: Copy assets
        run: npx cap copy android
      - name: Fix Kotlin duplicates
        run: |
          python3 -c "
          path = 'android/build.gradle'
          content = open(path).read()
          fix = '''
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          '''
          if 'resolutionStrategy' not in content:
              open(path, 'w').write(content + fix)
              print('Fix OK')
          "
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RepartoFacil-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
