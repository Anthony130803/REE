<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1923"/>
      <stop offset="100%" style="stop-color:#0A0F14"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676"/>
      <stop offset="100%" style="stop-color:#00B248"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD740"/>
      <stop offset="100%" style="stop-color:#FF8F00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00E676" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Outer ring accent -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#00E676" stroke-width="3" stroke-opacity="0.15"/>
  <circle cx="256" cy="256" r="230" fill="none" stroke="#00E676" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Speed lines (izquierda, horizontales) -->
  <line x1="60" y1="230" x2="140" y2="230" stroke="#00E676" stroke-width="4" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="40" y1="256" x2="130" y2="256" stroke="#00E676" stroke-width="6" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="60" y1="282" x2="140" y2="282" stroke="#00E676" stroke-width="4" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="75" y1="308" x2="135" y2="308" stroke="#00E676" stroke-width="2" stroke-linecap="round" stroke-opacity="0.3"/>

  <!-- === MOTO / SCOOTER === -->
  <!-- Rueda trasera -->
  <circle cx="170" cy="320" r="52" fill="none" stroke="#fff" stroke-width="14"/>
  <circle cx="170" cy="320" r="18" fill="none" stroke="#fff" stroke-width="8"/>
  <circle cx="170" cy="320" r="6" fill="#00E676"/>

  <!-- Rueda delantera -->
  <circle cx="360" cy="320" r="52" fill="none" stroke="#fff" stroke-width="14"/>
  <circle cx="360" cy="320" r="18" fill="none" stroke="#fff" stroke-width="8"/>
  <circle cx="360" cy="320" r="6" fill="#00E676"/>

  <!-- Chasis principal -->
  <path d="M170 320 L220 230 L300 230 L380 270 L360 320" 
        fill="none" stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Asiento / parte trasera -->
  <path d="M170 320 L185 285 L230 265 L300 262" 
        fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Manubrio -->
  <path d="M360 270 L370 240 L390 235 L395 250" 
        fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Motor/cuerpo -->
  <ellipse cx="278" cy="280" rx="42" ry="32" fill="#fff" fill-opacity="0.08" stroke="#fff" stroke-width="3" stroke-opacity="0.4"/>

  <!-- === REPARTIDOR (silueta simple) === -->
  <!-- Cuerpo inclinado hacia adelante -->
  <path d="M255 262 L300 225 L320 232 L275 268 Z" fill="#fff" fill-opacity="0.9"/>
  <!-- Cabeza con casco -->
  <circle cx="308" cy="213" r="22" fill="#fff"/>
  <path d="M288 213 Q295 195 315 195 Q335 195 330 213" fill="#00E676" stroke="#00E676" stroke-width="2"/>
  <!-- Brazo extendido al frente -->
  <path d="M300 228 L355 218 L358 230 L305 238 Z" fill="#fff" fill-opacity="0.85"/>
  <!-- Pierna trasera -->
  <path d="M255 265 L232 290 L245 296 L262 272 Z" fill="#fff" fill-opacity="0.7"/>

  <!-- === CAJA DE DELIVERY en la espalda === -->
  <rect x="218" y="220" width="44" height="36" rx="6" fill="url(#green)" filter="url(#shadow)"/>
  <!-- Cruz en la caja -->
  <line x1="240" y1="226" x2="240" y2="250" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="228" y1="238" x2="252" y2="238" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Moneda / pesos flotando (indicador de dinero) -->
  <circle cx="415" cy="185" r="20" fill="url(#amber)" filter="url(#glow)"/>
  <text x="415" y="192" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#0F1923">$</text>

  <!-- Pequeñas monedas -->
  <circle cx="445" cy="160" r="12" fill="url(#amber)" fill-opacity="0.6"/>
  <text x="445" y="165" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="12" font-weight="900" fill="#0F1923">$</text>

  <circle cx="390" cy="155" r="9" fill="url(#amber)" fill-opacity="0.4"/>
  <text x="390" y="160" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="#0F1923">$</text>

  <!-- Punto de destino (marcador arriba derecha) -->
  <path d="M456 95 Q456 75 470 75 Q484 75 484 90 Q484 108 470 118 Q456 108 456 95 Z" fill="#FF4757"/>
  <circle cx="470" cy="90" r="7" fill="#fff"/>

  <!-- Línea punteada de ruta -->
  <path d="M415 175 Q438 145 460 120" fill="none" stroke="#FFD740" stroke-width="2" stroke-dasharray="5,4" stroke-opacity="0.6"/>

</svg>
